version: '3.8'

services:
  automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apollo-automation
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - BROWSER_POOL_SIZE=3
      - COOKIE_ENCRYPTION_KEY=${COOKIE_ENCRYPTION_KEY}
      - PROXY_LIST=${PROXY_LIST}
      - HEALTH_CHECK_INTERVAL_MS=1800000
      - HEALTH_CHECK_API_BASE=https://your-api.railway.app/api
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    volumes:
      - browser_data:/app/browser-data
      - ./logs:/app/logs
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', (r) => { if (r.statusCode !== 200) process.exit(1) })"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: apollo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  health-cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apollo-health-cron
    restart: unless-stopped
    command: node cookie-health-check.mjs
    environment:
      - NODE_ENV=production
      - API_BASE=https://your-api.railway.app/api
      - CRON_INTERVAL=1800000
    depends_on:
      - redis
    volumes:
      - ./logs:/app/logs

volumes:
  redis_data:
  browser_data: